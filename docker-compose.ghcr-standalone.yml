# 使用 GHCR 预构建镜像，连接已有的 shared-db-net 网络（不启动 postgres）。
# 适用于 PostgreSQL 已由其他 compose 项目管理的场景。
#
# 用法: docker compose -f docker-compose.ghcr-standalone.yml up -d
# 指定版本: VMQ_IMAGE=ghcr.io/cvinit/alipay-vmq:v1.0.0 docker compose -f docker-compose.ghcr-standalone.yml up -d

services:
  alipay-vmq:
    image: ${VMQ_IMAGE:-ghcr.io/cvinit/alipay-vmq:latest}
    container_name: alipay-vmq
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file:
      - .env
    networks:
      - shared-db-net

networks:
  shared-db-net:
    external: true
    name: shared-db-net
